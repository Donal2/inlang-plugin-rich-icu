name: Release
# Fully automated npm publish via OIDC Trusted Publisher (no NPM_TOKEN, no 2FA).
# The OIDC token issued to this workflow is the proof-of-presence, so the publish
# goes PUBLIC directly — no staging, no manual approval. Provenance is generated
# automatically. See https://docs.npmjs.com/trusted-publishers
# Prerequisite (configured once on npmjs.com): Trusted Publisher enabled on the
# package → this GitHub repo + this workflow filename, with "Allow npm publish".
on:
  push:
    tags:
      - "v*"
permissions:
  contents: write
  id-token: write # OIDC: authentication without token
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # Active LTS
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npm install -g npm@latest # OIDC trusted publishing requires a recent npm
      # OIDC + trusted publisher: no NODE_AUTH_TOKEN, no 2FA; provenance automatic.
      - run: npm publish
      - uses: softprops/action-gh-release@v3
